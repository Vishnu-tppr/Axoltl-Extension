<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="success-title success-desc">
  <title id="success-title">Axoltl Success</title>
  <desc id="success-desc">Axolotl mascot cheering, signifying success or completion.</desc>
  <style>
    .body { fill: #f0d0c8; }
    .shadow { fill: #e0b8ae; }
    .accent { stroke: #01696f; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.5; }
    .accent-fill { fill: #01696f; }
    .eyes { fill: #28251d; }
    .smile { stroke: #28251d; fill: none; stroke-linecap: round; stroke-width: 2.5; }
    @media (prefers-color-scheme: dark) {
      .body { fill: #c4a090; }
      .shadow { fill: #9d7b6e; }
      .accent { stroke: #4f98a3; }
      .accent-fill { fill: #4f98a3; }
      .eyes { fill: #1c1b18; }
    }
  </style>
  <defs>
    <!-- Wi-Fi signal arcs -->
    <g id="gill-stalk" class="accent">
      <path d="M 0,-4 A 4,4 0 0,1 0,4" />
      <path d="M 5,-9 A 9,9 0 0,1 5,9" />
      <path d="M 10,-14 A 14,14 0 0,1 10,14" />
    </g>
    <!-- Sparkle shape -->
    <path id="sparkle" d="M -5,0 Q 0,0 0,-5 Q 0,0 5,0 Q 0,0 0,5 Q 0,0 -5,0 Z" class="accent-fill" />
  </defs>

  <!-- Sparkles -->
  <use href="#sparkle" x="25" y="25" transform="scale(1.2) rotate(15 25 25)" />
  <use href="#sparkle" x="95" y="30" />
  <use href="#sparkle" x="20" y="80" transform="scale(0.8)" />
  <use href="#sparkle" x="100" y="85" transform="scale(0.9) rotate(-15 100 85)" />

  <!-- Shaded back legs planted -->
  <rect x="38" y="90" width="12" height="15" rx="6" class="shadow" />
  <rect x="70" y="90" width="12" height="15" rx="6" class="shadow" />

  <!-- Upright Body -->
  <ellipse cx="60" cy="65" rx="32" ry="40" class="body" />
  <!-- Underbelly depth -->
  <ellipse cx="60" cy="85" rx="18" ry="8" class="shadow" opacity="0.6"/>

  <!-- Arms raised in celebration -->
  <rect x="25" y="45" width="12" height="18" rx="6" class="body" transform="rotate(-30 30 50)" />
  <rect x="83" y="45" width="12" height="18" rx="6" class="body" transform="rotate(30 90 50)" />

  <!-- Context ORB floating proudly above head -->
  <g transform="translate(60, 20)">
    <circle cx="0" cy="0" r="14" class="accent-fill" opacity="0.25" />
    <circle cx="0" cy="0" r="6" class="accent-fill" />
  </g>

  <!-- Gills (Flared outwards exictedly) -->
  <use href="#gill-stalk" transform="translate(32, 45) scale(-1, 1) rotate(-45)" />
  <use href="#gill-stalk" transform="translate(28, 60) scale(-1, 1) rotate(-10)" />
  <use href="#gill-stalk" transform="translate(32, 75) scale(-1, 1) rotate(35)" />

  <use href="#gill-stalk" transform="translate(88, 45) rotate(-45)" />
  <use href="#gill-stalk" transform="translate(92, 60) rotate(-10)" />
  <use href="#gill-stalk" transform="translate(88, 75) rotate(35)" />

  <!-- Face centered higher for upright posture -->
  <g transform="translate(0, -8)">
    <ellipse cx="42" cy="62" rx="4.5" ry="2.5" class="shadow" opacity="0.75" />
    <ellipse cx="78" cy="62" rx="4.5" ry="2.5" class="shadow" opacity="0.75" />
    
    <circle cx="50" cy="56" r="5.5" class="eyes" />
    <circle cx="70" cy="56" r="5.5" class="eyes" />
    
    <!-- Specular shifted to suggest looking slightly up at the orb -->
    <circle cx="51" cy="53" r="2" fill="#ffffff" />
    <circle cx="71" cy="53" r="2" fill="#ffffff" />

    <!-- Big Wide Smile (U shape) -->
    <path d="M 54,62 Q 60,72 66,62" class="smile" />
  </g>
</svg>
