<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="axoltl-title axoltl-desc">
  <title id="axoltl-title">Axoltl mascot</title>
  <desc id="axoltl-desc">A cute, smiling axolotl holding a glowing context node</desc>
  <style>
    .body { fill: #f0d0c8; }
    .shadow { fill: #e0b8ae; }
    .accent { stroke: #01696f; fill: none; stroke-linecap: round; stroke-width: 2.5; }
    .accent-fill { fill: #01696f; }
    .eyes { fill: #28251d; }
    .smile { stroke: #28251d; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.5; }
    @media (prefers-color-scheme: dark) {
      .body { fill: #c4a090; }
      .shadow { fill: #9d7b6e; }
      .accent { stroke: #4f98a3; }
      .accent-fill { fill: #4f98a3; }
      .eyes { fill: #1c1b18; }
    }
  </style>
  <defs>
    <!-- Wi-Fi signal arcs for a single gill stalk pointing right -->
    <!-- Spread out nicely to give a distinct tech-axolotl vibe -->
    <g id="gill-stalk" class="accent">
      <path d="M 0,-4 A 4,4 0 0,1 0,4" />
      <path d="M 5,-9 A 9,9 0 0,1 5,9" />
      <path d="M 10,-14 A 14,14 0 0,1 10,14" />
    </g>
  </defs>

  <!-- Plump Wavy Tail -->
  <path d="M 80,60 C 115,40 120,85 85,85 Z" class="shadow" />
  
  <!-- Back Legs (shaded for depth) -->
  <rect x="35" y="82" width="10" height="12" rx="5" class="shadow" />
  <rect x="75" y="82" width="10" height="12" rx="5" class="shadow" />

  <!-- Main Body (Soft plump teardrop/bean-like) -->
  <ellipse cx="60" cy="65" rx="38" ry="28" class="body" />
  
  <!-- Underbelly highlight/shadow to give weight -->
  <ellipse cx="60" cy="83" rx="22" ry="7" class="shadow" opacity="0.8" />

  <!-- Front Legs (pill shaped) -->
  <!-- Left arm holding context orb -->
  <rect x="42" y="86" width="12" height="15" rx="6" class="body" transform="rotate(15 48 93)"/>
  <!-- Right arm resting -->
  <rect x="66" y="86" width="12" height="13" rx="6" class="body" />

  <!-- Glowing Context Orb Held By Left Front Leg -->
  <g transform="translate(43, 98)">
    <circle cx="0" cy="0" r="11" class="accent-fill" opacity="0.25" />
    <circle cx="0" cy="0" r="4.5" class="accent-fill" />
  </g>

  <!-- Left Gills (Flipped horizontally and rotated exactly to frame the face) -->
  <!-- Upper -->
  <use href="#gill-stalk" transform="translate(25, 48) scale(-1, 1) rotate(-35)" />
  <!-- Middle -->
  <use href="#gill-stalk" transform="translate(20, 62) scale(-1, 1)" />
  <!-- Lower -->
  <use href="#gill-stalk" transform="translate(25, 76) scale(-1, 1) rotate(35)" />

  <!-- Right Gills -->
  <!-- Upper -->
  <use href="#gill-stalk" transform="translate(95, 48) rotate(-35)" />
  <!-- Middle -->
  <use href="#gill-stalk" transform="translate(100, 62)" />
  <!-- Lower -->
  <use href="#gill-stalk" transform="translate(95, 76) rotate(35)" />

  <!-- Cute Face Chunk (moved slightly down to give large forehead/chibi proportions) -->
  <g transform="translate(0, 3)">
    <!-- Cheeks (Kawaii blushes) -->
    <ellipse cx="40" cy="60" rx="4.5" ry="2.5" class="shadow" opacity="0.75" />
    <ellipse cx="80" cy="60" rx="4.5" ry="2.5" class="shadow" opacity="0.75" />
    
    <!-- Eyes (pure circles, large, soft) -->
    <circle cx="48" cy="55" r="5.5" class="eyes" />
    <circle cx="72" cy="55" r="5.5" class="eyes" />
    
    <!-- Eye Specular Highlights (single white dot offset up-right) -->
    <circle cx="50" cy="53" r="1.8" fill="#ffffff" />
    <circle cx="74" cy="53" r="1.8" fill="#ffffff" />

    <!-- Cute Smile (between eyes) -->
    <path d="M 54,63 Q 60,69 66,63" class="smile" />
  </g>
</svg>
