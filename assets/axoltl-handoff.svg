<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" role="img" aria-labelledby="handoff-title">
  <title id="handoff-title">Axoltl session handoff</title>
  <style>
    .device { fill: #eaeaec; stroke: #d3d3d8; stroke-width: 2; rx: 4; }
    .screen { fill: #ffffff; }
    .body { fill: #f0d0c8; }
    .shadow { fill: #e0b8ae; }
    .accent { stroke: #01696f; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2; }
    .accent-fill { fill: #01696f; }
    .eyes { fill: #28251d; }
    .smile { stroke: #28251d; fill: none; stroke-linecap: round; stroke-width: 2; }
    .path-line { stroke: #01696f; stroke-width: 1.5; stroke-dasharray: 4,4; fill: none; opacity: 0.3; }
    @media (prefers-color-scheme: dark) {
      .device { fill: #2a2a2c; stroke: #3a3a3c; }
      .screen { fill: #1c1b19; }
      .body { fill: #c4a090; }
      .shadow { fill: #9d7b6e; }
      .accent { stroke: #4f98a3; }
      .accent-fill { fill: #4f98a3; }
      .eyes { fill: #1c1b18; }
      .path-line { stroke: #4f98a3; }
    }
  </style>

  <defs>
    <!-- Wi-Fi signal arcs for gills -->
    <g id="gill-stalk" class="accent">
      <path d="M 0,-3 A 3,3 0 0,1 0,3" />
      <path d="M 4,-6 A 6,6 0 0,1 4,6" />
      <path d="M 8,-9 A 9,9 0 0,1 8,9" />
    </g>
    <!-- Mini Axoltl for phone screen -->
    <g id="mini-axoltl" transform="scale(0.35)">
      <ellipse cx="60" cy="65" rx="38" ry="28" class="body" />
      <circle cx="48" cy="55" r="5.5" class="eyes" />
      <circle cx="72" cy="55" r="5.5" class="eyes" />
      <path d="M 54,63 Q 60,69 66,63" class="smile" />
      <!-- simple gills -->
      <path d="M 25,65 A 5,5 0 0,0 18,58 M 18,65 A 10,10 0 0,0 8,55" class="accent" />
      <path d="M 95,65 A 5,5 0 0,1 102,58 M 102,65 A 10,10 0 0,1 112,55" class="accent" />
    </g>
  </defs>

  <!-- Left: Phone -->
  <rect x="15" y="40" width="30" height="55" class="device" />
  <rect x="18" y="43" width="24" height="49" rx="2" class="screen" />
  <use href="#mini-axoltl" x="12" y="38" />

  <!-- Connecting dotted path -->
  <path d="M 50,65 Q 100,85 150,65" class="path-line" />

  <!-- Center: Main Axoltl swimming -->
  <g transform="translate(80, 50)">
    <!-- Swimming tail, organically waving -->
    <path d="M 30,5 C 60,-5 70,22 50,30 C 35,35 25,25 25,25 Z" class="shadow" />
    
    <!-- Body horizontal -->
    <ellipse cx="0" cy="8" rx="35" ry="22" class="body" />
    <ellipse cx="0" cy="23" rx="20" ry="6" class="shadow" opacity="0.6"/>

    <!-- Cute pill Legs swimming back -->
    <rect x="-15" y="24" width="10" height="10" rx="5" class="body" transform="rotate(30 -11 24)" />
    <rect x="15" y="24" width="10" height="10" rx="5" class="body" transform="rotate(-30 19 24)" />

    <!-- Context Orb gently held forward -->
    <g transform="translate(-25, 23)">
      <circle cx="0" cy="0" r="10" class="accent-fill" opacity="0.3" />
      <circle cx="0" cy="0" r="4" class="accent-fill" />
    </g>

    <!-- Gills (swept back organically due to swimming speed) -->
    <use href="#gill-stalk" transform="translate(-28, -2) scale(-1, 1) rotate(-30)" />
    <use href="#gill-stalk" transform="translate(-32, 10) scale(-1, 1) rotate(0)" />
    
    <use href="#gill-stalk" transform="translate(28, -2) rotate(-30)" />
    <use href="#gill-stalk" transform="translate(32, 10) rotate(0)" />

    <!-- Eyes (looking forward, gentle) -->
    <ellipse cx="-16" cy="1" rx="4" ry="5.5" class="eyes" />
    <ellipse cx="6" cy="1" rx="4" ry="5.5" class="eyes" />
    <!-- Specular highlight -->
    <circle cx="-15" cy="-1" r="1.5" fill="#ffffff" />
    <circle cx="7" cy="-1" r="1.5" fill="#ffffff" />

    <!-- Soft blush cheeks -->
    <ellipse cx="-20" cy="6" rx="2" ry="3" class="shadow" opacity="0.75" />
    <ellipse cx="12" cy="6" rx="2" ry="3" class="shadow" opacity="0.75" />

    <!-- Smile (sideways projection) -->
    <path d="M -10,12 Q -2,15 2,12" class="smile" />
  </g>

  <!-- Right: Laptop -->
  <rect x="155" y="45" width="40" height="25" class="device" />
  <rect x="158" y="48" width="34" height="19" rx="1" class="screen" />
  <path d="M 150,70 L 195,70 L 200,75 L 145,75 Z" class="device" fill="#d3d3d8" />
  <!-- A little glow on the laptop welcoming standard handoff -->
  <circle cx="175" cy="58" r="8" class="accent-fill" opacity="0.1" />
</svg>
