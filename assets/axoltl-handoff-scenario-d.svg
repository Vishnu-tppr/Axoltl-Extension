<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" role="img" aria-labelledby="sce_d_title">
  <title id="sce_d_title">Scenario D: Context Carry Same Device Account Swapping</title>
  <style>
    .device { fill: #eaeaec; stroke: #d3d3d8; stroke-width: 2; rx: 4; }
    .screen { fill: #ffffff; }
    .body { fill: #f0d0c8; }
    .shadow { fill: #e0b8ae; }
    .accent { stroke: #01696f; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2; }
    .accent-fill { fill: #01696f; }
    .eyes { fill: #28251d; }
    .smile { stroke: #28251d; fill: none; stroke-linecap: round; stroke-width: 2; }
    .avatar1 { fill: #5c6bc0; }
    .avatar2 { fill: #ab47bc; }
    
    @media (prefers-color-scheme: dark) {
      .device { fill: #2a2a2c; stroke: #3a3a3c; }
      .screen { fill: #1c1b19; }
      .body { fill: #c4a090; }
      .shadow { fill: #9d7b6e; }
      .accent { stroke: #4f98a3; }
      .accent-fill { fill: #4f98a3; }
      .eyes { fill: #1c1b18; }
    }

    /* Single location pack/unpack */
    @keyframes ax-pack-unpack { 
      0%, 25% { transform: scale(1); opacity: 1; } 
      35%, 65% { transform: scale(0); opacity: 0; } 
      75%, 100% { transform: scale(1); opacity: 1; }
    }
    
    /* The Avatar flips sequentially matching the disappearance */
    @keyframes avatar-spin {
      0%, 40% { transform: rotateY(0deg); }
      50% { transform: rotateY(90deg); }
      60%, 100% { transform: rotateY(180deg); }
    }

    @keyframes avatar-color-1 {
      0%, 50% { opacity: 1; }
      50.1%, 100% { opacity: 0; }
    }

    @keyframes avatar-color-2 {
      0%, 50% { opacity: 0; }
      50.1%, 100% { opacity: 1; }
    }

    @keyframes ui-loader {
      0%, 40% { transform: scale(0); opacity: 0; }
      50% { transform: scale(1); opacity: 1; }
      60%, 100% { transform: scale(2); opacity: 0; }
    }

    .anim-pack-up { animation: ax-pack-unpack 4s cubic-bezier(0.4, 0, 0.2, 1) infinite; }
    .anim-spin { animation: avatar-spin 4s ease-in-out infinite; transform-origin: center; }
    .anim-col-1 { animation: avatar-color-1 4s linear infinite; }
    .anim-col-2 { animation: avatar-color-2 4s linear infinite; transform: rotateY(180deg); }
    .anim-ui-loader { animation: ui-loader 4s ease-out infinite; transform-origin: center; }
  </style>

  <defs>
    <g id="mini-session-axoltl" transform="scale(0.35)">
      <ellipse cx="60" cy="98" rx="28" ry="6" class="shadow" opacity="0.4" />
      <path d="M 80,60 C 115,40 120,85 85,85 Z" class="shadow" />
      <rect x="35" y="82" width="10" height="12" rx="5" class="shadow" />
      <rect x="75" y="82" width="10" height="12" rx="5" class="shadow" />
      <ellipse cx="60" cy="65" rx="38" ry="28" class="body" />
      <rect x="42" y="86" width="12" height="15" rx="6" class="body" transform="rotate(15 48 93)"/>
      <rect x="66" y="86" width="12" height="13" rx="6" class="body" />
      <g transform="translate(43, 98)"><circle cx="0" cy="0" r="14" class="accent-fill" opacity="0.4" /><circle cx="0" cy="0" r="5" class="accent-fill" /></g>
      <g transform="translate(0, 3)"><ellipse cx="40" cy="60" rx="4.5" ry="2.5" class="shadow" opacity="0.75" /><ellipse cx="80" cy="60" rx="4.5" ry="2.5" class="shadow" opacity="0.75" /><circle cx="48" cy="55" r="5.5" class="eyes" /><circle cx="72" cy="55" r="5.5" class="eyes" /><circle cx="50" cy="53" r="1.8" fill="#ffffff" /><circle cx="74" cy="53" r="1.8" fill="#ffffff" /><path d="M 54,63 Q 60,69 66,63" class="smile" /></g>
    </g>
  </defs>

  <!-- Large Centered Device -->
  <rect x="35" y="15" width="130" height="85" class="device" />
  <rect x="38" y="18" width="124" height="79" rx="1" class="screen" />
  <path d="M 30,100 L 170,100 L 175,105 L 25,105 Z" class="device" fill="#d3d3d8" />
  
  <!-- Active Central Window UI border -->
  <rect x="50" y="30" width="100" height="60" rx="3" fill="#f7f7f9" stroke="#e0e0e0" stroke-width="1" />

  <!-- Avatar Profile Icon top right Corner -->
  <g transform="translate(135, 40)">
    <g class="anim-spin">
      <!-- Account 1 -->
      <g class="anim-col-1">
        <circle cx="0" cy="0" r="6" class="avatar1" />
        <path d="M -3,2 A 3,3 0 0,1 3,2" stroke="#fff" fill="none" />
        <circle cx="0" cy="-1" r="1.5" fill="#fff" />
      </g>
      <!-- Account 2 -->
      <g class="anim-col-2">
        <circle cx="0" cy="0" r="6" class="avatar2" />
        <circle cx="-1.5" cy="-1.5" r="1" fill="#fff" />
        <circle cx="1.5" cy="-1.5" r="1" fill="#fff" />
        <path d="M -2,2 L 2,2" stroke="#fff" fill="none" stroke-width="1" />
      </g>
    </g>
    <circle cx="0" cy="0" r="10" class="accent-fill anim-ui-loader" />
  </g>

  <!-- Axoltl packing and unpacking on the exact same UI position immediately after account swap-->
  <g transform="translate(75, 48)">
    <g class="anim-pack-up" style="transform-origin: 21px 22px;">
      <use href="#mini-session-axoltl" />
    </g>
  </g>

</svg>
