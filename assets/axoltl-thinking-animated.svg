<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" role="img" aria-labelledby="think-title think-desc">
  <title id="think-title">Axoltl Thinking</title>
  <desc id="think-desc">Axolotl mascot pondering or analyzing.</desc>
  <style>
    .body { fill: #f0d0c8; }
    .shadow { fill: #e0b8ae; }
    .accent { stroke: #01696f; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-width: 2.5; }
    .accent-fill { fill: #01696f; }
    .eyes { fill: #28251d; }
    .smile { stroke: #28251d; fill: none; stroke-linecap: round; stroke-width: 2.5; }
    
    @media (prefers-color-scheme: dark) {
      .body { fill: #c4a090; }
      .shadow { fill: #9d7b6e; }
      .accent { stroke: #4f98a3; }
      .accent-fill { fill: #4f98a3; }
      .eyes { fill: #1c1b18; }
    }

    @keyframes float-think {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-3px); }
    }
    
    @keyframes dot-fade {
      0%, 100% { opacity: 0.1; transform: scale(0.8); }
      20% { opacity: 1; transform: scale(1.1); }
      80% { opacity: 0.1; transform: scale(0.8); }
    }
    
    @keyframes bulb-glow {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.5; }
    }
    
    @keyframes head-tilt {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(-2deg); }
    }

    .anim-float { animation: float-think 4s ease-in-out infinite; transform-origin: 60px 80px; }
    .anim-tilt { animation: head-tilt 4s ease-in-out infinite; transform-origin: 55px 72px; }
    
    .dot-1 { animation: dot-fade 2.5s infinite 0s; transform-origin: center; }
    .dot-2 { animation: dot-fade 2.5s infinite 0.4s; transform-origin: center; }
    .dot-3 { animation: dot-fade 2.5s infinite 0.8s; transform-origin: center; }
    .anim-glow { animation: bulb-glow 4s ease-in-out infinite; }
  </style>

  <defs>
    <g id="gill-stalk" class="accent">
      <path d="M 0,-4 A 4,4 0 0,1 0,4" />
      <path d="M 5,-9 A 9,9 0 0,1 5,9" />
      <path d="M 10,-14 A 14,14 0 0,1 10,14" />
    </g>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="60" cy="95" rx="35" ry="5" class="shadow" opacity="0.4"/>

  <g class="anim-float">
    <!-- Plump sitting base -->
    <path d="M 85,80 C 110,65 110,95 85,90 Z" class="shadow" />
    <rect x="35" y="85" width="15" height="10" rx="5" class="shadow" />
    <rect x="65" y="85" width="15" height="10" rx="5" class="shadow" />

    <g class="anim-tilt">
      <ellipse cx="55" cy="72" rx="35" ry="25" class="body" />
      
      <!-- Left arm resting on leg/ground -->
      <rect x="38" y="80" width="12" height="12" rx="6" class="body" />
      <!-- Right arm reaching toward chin -->
      <rect x="68" y="66" width="12" height="16" rx="6" class="body" transform="rotate(-30 74 74)" />

      <!-- Gills -->
      <use href="#gill-stalk" transform="translate(23, 60) scale(-1, 1) rotate(-15)" />
      <use href="#gill-stalk" transform="translate(18, 70) scale(-1, 1) rotate(10)" />
      <use href="#gill-stalk" transform="translate(26, 80) scale(-1, 1) rotate(35)" />

      <use href="#gill-stalk" transform="translate(86, 52) rotate(-55)" />
      <use href="#gill-stalk" transform="translate(90, 64) rotate(-25)" />
      <use href="#gill-stalk" transform="translate(88, 76) rotate(15)" />

      <g transform="translate(-2, 4)">
        <ellipse cx="40" cy="60" rx="4.5" ry="2.5" class="shadow" opacity="0.75" />
        <ellipse cx="78" cy="56" rx="4.5" ry="2.5" class="shadow" opacity="0.75" />
        
        <circle cx="48" cy="55" r="5.5" class="eyes" />
        <circle cx="72" cy="52" r="5.5" class="eyes" />
        
        <circle cx="46" cy="52" r="1.8" fill="#ffffff" />
        <circle cx="70" cy="49" r="1.8" fill="#ffffff" />

        <path d="M 57,63 Q 60,65 65,62" class="smile" />
      </g>
    </g>
  </g>

  <!-- Floating Context ORB emitting thought bubble (moves independently of body) -->
  <g transform="translate(30, 35)">
    <!-- Thought Bubble -->
    <path d="M 5,-5 C -5,-15 15,-20 20,-10 C 35,-15 35,5 25,10 C 25,20 5,20 0,10 C -5,5 2,0 5,-5 Z" class="shadow" opacity="0.3"/>
    
    <!-- Animating dots -->
    <g transform="translate(10, 0)">
      <circle cx="0" cy="0" r="2" class="accent-fill dot-1" />
    </g>
    <g transform="translate(18, 0)">
      <circle cx="0" cy="0" r="2" class="accent-fill dot-2" />
    </g>
    <g transform="translate(26, 0)">
      <circle cx="0" cy="0" r="2" class="accent-fill dot-3" />
    </g>
    
    <circle cx="0" cy="20" r="2" class="accent-fill" opacity="0.5" />
    <circle cx="10" cy="35" r="4" class="accent-fill anim-glow" />
  </g>
</svg>
